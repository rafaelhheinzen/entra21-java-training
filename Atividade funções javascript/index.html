<section class="sumFunctions">
    
    <h2>Sum function</h2>


    <input type="number" id="sumNumber1" placeholder="number" >
    <input type="number" id="sumNumber2" placeholder="another number" >
    <button id="sumBtn">Make sum</button>

    <h3>Result:</h3>
    <div id="result"></div>
</section>




<section class="sumFunctions">

    <input type="number" id="subtractNumber1" placeholder="number" >
    <input type="number" id="subtractNumber2" placeholder="another number" >

    <h3>Result:</h3>
    <div id="subtractResult"></div>
</section>
